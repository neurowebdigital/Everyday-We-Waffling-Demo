<header class="site-header">

  <!-- Overlay -->
  <div class="menu-overlay" id="menuOverlay"></div>

  <div class="container">
    <nav class="navbar">

      <!-- Logo -->
      <a href="index.html" class="logo">
        <img src="assets/images/logo.jpeg" alt="Everyday We Waffling Logo">
        <span>Everyday We Waffling</span>
      </a>

      <!-- Navigation -->
      <ul class="nav-links" id="navMenu">

        <!-- Close Button -->
        <div class="menu-close" id="menuClose">✕</div>

        <li><a href="index.html" data-page="index">Home</a></li>
        <li><a href="menu.html" data-page="menu">Menu</a></li>
        <li><a href="events.html" data-page="events">Events</a></li>
        <li><a href="gallery.html" data-page="gallery">Gallery</a></li>
        <li><a href="about.html" data-page="about">About</a></li>
        <li><a href="contact.html" data-page="contact">Contact</a></li>

      </ul>

      <!-- Hamburger -->
      <div class="nav-actions">
        <div class="hamburger" id="hamburger">
          <span></span>
          <span></span>
          <span></span>
        </div>
      </div>

    </nav>
  </div>

</header>

<script>
document.addEventListener("DOMContentLoaded", function(){

  const hamburger = document.getElementById("hamburger");
  const navMenu = document.getElementById("navMenu");
  const menuClose = document.getElementById("menuClose");
  const menuOverlay = document.getElementById("menuOverlay");

  if(!hamburger || !navMenu || !menuClose || !menuOverlay) return;

  function openMenu(){
    navMenu.classList.add("active");
    menuOverlay.classList.add("active");
  }

  function closeMenu(){
    navMenu.classList.remove("active");
    menuOverlay.classList.remove("active");
  }

  hamburger.addEventListener("click", openMenu);
  menuClose.addEventListener("click", closeMenu);
  menuOverlay.addEventListener("click", closeMenu);

  document.querySelectorAll(".nav-links a").forEach(link => {
    link.addEventListener("click", closeMenu);
  });

});
</script>
