<header class="site-header">
  <div class="container">
    <nav class="navbar">

      <!-- Logo -->
      <a href="index.html" class="logo">
        <img src="assets/images/logo.jpeg" alt="Everyday We Waffling Logo">
        <span class="logo-text">Everyday We Waffling</span>
      </a>

      <!-- Navigation -->
      <ul class="nav-links" id="nav-links">
        <li><a href="index.html" data-page="index">Home</a></li>
        <li><a href="menu.html" data-page="menu">Menu</a></li>
        <li><a href="events.html" data-page="events">Events</a></li>
        <li><a href="gallery.html" data-page="gallery">Gallery</a></li>
        <li><a href="about.html" data-page="about">About</a></li>
        <li><a href="contact.html" data-page="contact">Contact</a></li>
      </ul>

      <!-- Mobile Menu -->
      <div class="nav-actions">
        <div class="hamburger" id="hamburger">
          <span></span>
          <span></span>
          <span></span>
        </div>
      </div>

    </nav>
  </div>
</header>

<script>
document.addEventListener("DOMContentLoaded", function () {
  const hamburger = document.getElementById("hamburger");
  const navLinks = document.getElementById("nav-links");

  if(hamburger){
    hamburger.addEventListener("click", () => {
      hamburger.classList.toggle("active");
      navLinks.classList.toggle("active");
    });

    // Close when clicking links (mobile UX)
    document.querySelectorAll(".nav-links a").forEach(link => {
      link.addEventListener("click", () => {
        hamburger.classList.remove("active");
        navLinks.classList.remove("active");
      });
    });
  }
});
</script>
