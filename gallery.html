<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gallery | Everyday We Waffling</title>
<meta name="description" content="Explore our signature waffles, luxury milkshakes and unforgettable dessert creations at Everyday We Waffling. Tag us to get featured!">

<!-- Styles -->
<link rel="stylesheet" href="css/styles.css">
<link rel="stylesheet" href="css/gallery.css">

<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<div id="header"></div>

<!-- ================= HERO ================= -->
<section class="gallery-hero reveal">
  <div class="container">

    <span class="eyebrow">Our Creations</span>

    <h1>Moments Worth Sharing</h1>

    <p class="hero-subtext">
      From golden waffles to over-the-top milkshakes —
      every creation is designed to impress, indulgent,
      photogenic, and unforgettable.
    </p>

  </div>
</section>

<!-- ================= GALLERY ================= -->
<section class="gallery-section reveal">
  <div class="container">

    <div class="gallery-grid">

      <div class="gallery-item">
        <img src="assets/images/waffle.jpeg" alt="Signature waffle dessert" loading="lazy">
      </div>

      <div class="gallery-item tall">
        <img src="assets/images/sprinkle.jpeg" alt="Luxury milkshake" loading="lazy">
      </div>

      <div class="gallery-item">
        <img src="assets/images/marsh.jpeg" alt="Marshmallow dessert waffle" loading="lazy">
      </div>

      <div class="gallery-item wide">
        <img src="assets/images/special.jpeg" alt="Special waffle creation" loading="lazy">
      </div>

      <div class="gallery-item">
        <img src="assets/images/icecream.jpeg" alt="Ice cream waffle combo" loading="lazy">
      </div>

      <div class="gallery-item">
        <img src="assets/images/waffle.jpeg" alt="Chocolate waffle" loading="lazy">
      </div>

    </div>

  </div>
</section>

<!-- ================= INSTAGRAM CTA ================= -->
<section class="gallery-cta reveal">
  <div class="container">

    <h2>Tag Us & Get Featured</h2>

    <p class="insta-handle">@everydaywewaffling</p>

    <a href="https://www.instagram.com/everyday_we_waffling?igsh=M3hjNGFtZWt4emNu"
       target="_blank"
       rel="noopener"
       class="btn-primary">

       Follow Us On Instagram
    </a>

  </div>
</section>

<!-- ================= LIGHTBOX ================= -->
<div class="lightbox" id="lightbox">

  <button class="close-lightbox" aria-label="Close image">&times;</button>

  <img id="lightbox-img" src="" alt="Expanded gallery image">

</div>

<div id="footer"></div>

<script src="components/component.js"></script>

<script>
/* ================= SCROLL REVEAL ================= */
const reveals = document.querySelectorAll(".reveal, .gallery-item");

const observer = new IntersectionObserver(entries=>{
  entries.forEach(entry=>{
    if(entry.isIntersecting){
      entry.target.classList.add("active");
    }
  });
},{ threshold:0.15 });

reveals.forEach(reveal=>{
  observer.observe(reveal);
});

/* ================= LIGHTBOX ================= */
const galleryImages = document.querySelectorAll(".gallery-item img");
const lightbox = document.getElementById("lightbox");
const lightboxImg = document.getElementById("lightbox-img");
const closeLightbox = document.querySelector(".close-lightbox");

galleryImages.forEach(img=>{
  img.addEventListener("click",()=>{
    lightbox.style.display = "flex";
    lightboxImg.src = img.src;
  });
});

closeLightbox.addEventListener("click",()=>{
  lightbox.style.display = "none";
});

let startX = 0;

lightbox.addEventListener("touchstart", e => {
  startX = e.touches[0].clientX;
});

lightbox.addEventListener("touchend", e => {
  let endX = e.changedTouches[0].clientX;
  if(Math.abs(startX - endX) > 50){
    lightbox.style.display = "none";
  }
});

/* Close on background click */
lightbox.addEventListener("click", (e)=>{
  if(e.target === lightbox){
    lightbox.style.display = "none";
  }
});
</script>

</body>
</html>
